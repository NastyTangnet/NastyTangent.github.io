<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Coin Collection</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="loadingOverlay" class="loading" aria-live="polite" aria-busy="true">
      <div class="loading__card">
        <div class="loading__mark" aria-hidden="true">CC</div>
        <div class="loading__title">Loading Collection…</div>
        <div class="loading__sub" id="loadingText">Fetching coins.json</div>
        <div class="loading__pct" id="loadingPct">0%</div>
        <div class="loading__bar" aria-hidden="true"><div class="loading__barFill is-indeterminate" id="loadingBarFill"></div></div>
      </div>
    </div>

    <header class="topbar">
      <div class="topbar__left">
        <div class="mark" aria-hidden="true">CC</div>
        <div>
          <div class="title">Coin Collection</div>
          <div class="subtitle" id="subtitle">Loading…</div>
        </div>
      </div>
      <div class="topbar__right">
        <button class="btn" id="reloadBtn" type="button" title="Reload coins.json">Reload</button>
        <label class="btn btn--ghost" title="Import a coins.json file into this browser">
          Import
          <input id="fileInput" type="file" accept=".json,application/json" hidden />
        </label>
        <button class="btn btn--ghost" id="exportBtn" type="button" title="Download what’s currently loaded as JSON">Export</button>
        <button class="btn btn--danger" id="clearBtn" type="button" title="Remove saved data from this browser">Clear</button>
      </div>
    </header>

    <main class="page">
      <section class="controls" aria-label="Browse">
        <div class="controls__row controls__row--search">
          <div class="field field--grow">
            <label class="label" for="searchInput">Search</label>
            <input id="searchInput" class="input" placeholder="Search coin type, year, mint, notes…" />
          </div>
          <div class="field">
            <label class="label" for="sortSelect">Sort</label>
            <select id="sortSelect" class="select">
              <option value="nameAsc">A–Z</option>
              <option value="nameDesc">Z–A</option>
              <option value="qtyDesc">Most Coins</option>
              <option value="qtyAsc">Fewest Coins</option>
              <option value="yearOldest">Oldest</option>
              <option value="yearNewest">Newest</option>
            </select>
          </div>
          <div class="meta" id="meta">—</div>
        </div>
      </section>

      <section class="results" aria-label="Coins">
        <div id="seriesGrid" class="seriesGrid" aria-live="polite"></div>
      </section>

      <section class="silver" aria-label="Silver (Coming Soon)">
        <div class="silver__head">
          <div>
            <div class="silver__title">Silver</div>
            <div class="silver__sub">Live spot price + graph coming soon.</div>
          </div>
          <div class="silver__pill">Coming soon</div>
        </div>
        <div class="silver__body">
          <div class="silver__card">
            <div class="silver__k">Spot (USD / oz)</div>
            <div class="silver__v">$—</div>
          </div>
          <div class="silver__card silver__card--wide">
            <div class="silver__k">Price Graph</div>
            <div class="silver__graph" aria-hidden="true"></div>
          </div>
        </div>
      </section>
    </main>

    <dialog id="imageDialog" class="imgDialog">
      <div class="imgDialog__header">
        <div class="imgDialog__title" id="imgTitle">Photo</div>
        <button class="btn btn--ghost" id="closeImageBtn" type="button">Close</button>
      </div>
      <div class="imgDialog__body">
        <img id="imgFull" class="imgDialog__img" alt="Coin photo" loading="lazy" decoding="async" />
      </div>
    </dialog>

    <dialog id="layerDialog" class="layerDialog">
      <div class="layerDialog__header">
        <button class="btn btn--ghost" id="layerBackBtn" type="button">Back</button>
        <div class="layerDialog__titles">
          <div class="layerDialog__title" id="layerTitle">—</div>
          <div class="layerDialog__sub" id="layerSub">—</div>
        </div>
        <button class="btn btn--ghost" id="layerCloseBtn" type="button">Close</button>
      </div>
      <div class="layerDialog__body">
        <div id="layerList" class="layerList" aria-live="polite"></div>

        <div id="layerDetail" class="layerDetail" hidden>
          <div class="layerDetail__photos">
            <button class="photoTile" id="detailObvBtn" type="button" title="Open obverse">
              <div class="photoTile__label">Obverse</div>
              <img id="detailObvImg" alt="Obverse" loading="lazy" decoding="async" />
            </button>
            <button class="photoTile" id="detailRevBtn" type="button" title="Open reverse">
              <div class="photoTile__label">Reverse</div>
              <img id="detailRevImg" alt="Reverse" loading="lazy" decoding="async" />
            </button>
          </div>

          <div class="kv kv--wide">
            <div class="kv__k">Year</div>
            <div class="kv__v" id="detailYear">—</div>
            <div class="kv__k">Type</div>
            <div class="kv__v" id="detailType">—</div>
            <div class="kv__k">Mint</div>
            <div class="kv__v" id="detailMint">—</div>
            <div class="kv__k">Notes</div>
            <div class="kv__v notes" id="detailNotes">—</div>
          </div>
        </div>
      </div>
    </dialog>

    <script src="./app.js"></script>
  </body>
</html>
