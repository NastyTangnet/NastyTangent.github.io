<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Coin Collection</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar__left">
        <div class="mark" aria-hidden="true">CC</div>
        <div>
          <div class="title">Coin Collection</div>
          <div class="subtitle" id="subtitle">Loading…</div>
        </div>
      </div>
      <div class="topbar__right">
        <button class="btn" id="reloadBtn" type="button" title="Reload coins.json">Reload</button>
        <label class="btn btn--ghost" title="Import a coins.json file into this browser">
          Import
          <input id="fileInput" type="file" accept=".json,application/json" hidden />
        </label>
        <button class="btn btn--ghost" id="exportBtn" type="button" title="Download what’s currently loaded as JSON">Export</button>
        <button class="btn btn--danger" id="clearBtn" type="button" title="Remove saved data from this browser">Clear</button>
      </div>
    </header>

    <main class="page">
      <section class="controls" aria-label="Filters">
        <div class="controls__row">
          <div class="field">
            <label class="label" for="typeSelect">Type</label>
            <select id="typeSelect" class="select">
              <option value="">All</option>
            </select>
          </div>

          <div class="field">
            <label class="label" for="nameSelect">Coin</label>
            <select id="nameSelect" class="select">
              <option value="">All</option>
            </select>
          </div>

          <div class="field">
            <label class="label" for="yearSelect">Year</label>
            <select id="yearSelect" class="select">
              <option value="">All</option>
            </select>
          </div>

          <div class="field">
            <label class="label" for="mintSelect">Mint</label>
            <select id="mintSelect" class="select">
              <option value="">All</option>
            </select>
          </div>

          <div class="field">
            <label class="label" for="sortSelect">Sort</label>
            <select id="sortSelect" class="select">
              <option value="yearDesc">Year ↓</option>
              <option value="yearAsc">Year ↑</option>
              <option value="nameAsc">Name A–Z</option>
              <option value="nameDesc">Name Z–A</option>
              <option value="qtyDesc">Qty ↓</option>
              <option value="qtyAsc">Qty ↑</option>
            </select>
          </div>
        </div>

        <div class="controls__row controls__row--search">
          <div class="field field--grow">
            <label class="label" for="searchInput">Search</label>
            <input id="searchInput" class="input" placeholder="Search name, year, mint, notes…" />
          </div>
          <div class="meta" id="meta">—</div>
        </div>
      </section>

      <section class="results" aria-label="Coins">
        <div id="list" class="list" aria-live="polite"></div>
      </section>
    </main>

    <dialog id="imageDialog" class="imgDialog">
      <div class="imgDialog__header">
        <div class="imgDialog__title" id="imgTitle">Photo</div>
        <button class="btn btn--ghost" id="closeImageBtn" type="button">Close</button>
      </div>
      <div class="imgDialog__body">
        <img id="imgFull" class="imgDialog__img" alt="Coin photo" loading="lazy" decoding="async" />
      </div>
    </dialog>

    <script src="./app.js"></script>
  </body>
</html>
