<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Coin Collection</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="hero">
      <div class="hero__bg"></div>
      <div class="hero__content">
        <div class="hero__titleRow">
          <div class="brandMark" aria-hidden="true">CC</div>
          <div>
            <div class="hero__title">Coin Collection</div>
            <div class="hero__subtitle" id="subtitle">No data loaded</div>
          </div>
        </div>

        <div class="hero__actions">
          <label class="btn btn--primary">
            Import JSON
            <input id="fileInput" type="file" accept=".json,application/json" hidden />
          </label>
          <button class="btn btn--ghost" id="exportBtn" title="Download a JSON copy of what’s currently loaded">
            Export
          </button>
          <button class="btn btn--ghost btn--danger" id="clearBtn" title="Remove saved data from this browser">
            Clear
          </button>
        </div>
      </div>
    </header>

    <main class="sheet">
      <div class="sheet__toolbar">
        <div class="sheet__left">
          <input id="searchInput" class="input" placeholder="Search name, year, mint, notes…" />

          <div class="toolGroup">
            <div class="toolLabel">Type</div>
            <div id="typeChips" class="chips" aria-label="Type filter chips"></div>
            <select id="typeFilter" class="select" title="Filter by type" hidden>
              <option value="">All Types</option>
            </select>
          </div>
        </div>

        <div class="sheet__right">
          <div class="toolGroup toolGroup--compact">
            <div class="toolLabel">Silver</div>
            <div class="spotPill">
              <span class="spotPill__prefix">$</span>
              <input id="spotInput" class="spotPill__input" inputmode="decimal" placeholder="25.00" />
              <span class="spotPill__suffix">/oz</span>
            </div>
          </div>

          <div class="toolGroup toolGroup--compact">
            <div class="toolLabel">Sort</div>
            <select id="sortSelect" class="select" title="Sort">
              <option value="yearAsc">Year ↑</option>
              <option value="yearDesc">Year ↓</option>
              <option value="nameAsc">Name A–Z</option>
              <option value="nameDesc">Name Z–A</option>
              <option value="typeAsc">Type</option>
              <option value="mintAsc">Mint</option>
              <option value="qtyDesc">Qty ↓</option>
              <option value="meltDesc">Melt ↓</option>
            </select>
          </div>
        </div>
      </div>

      <div class="sheet__stats" id="stats"></div>

      <div class="tableWrap">
        <table class="table" id="table" aria-live="polite">
          <thead>
            <tr>
              <th class="col--bu">BU</th>
              <th class="col--name">Name</th>
              <th class="col--year">Year</th>
              <th class="col--mint">Mint</th>
              <th class="col--type">Type</th>
              <th class="col--qty">Qty</th>
              <th class="col--melt">Melt</th>
              <th class="col--notes">Notes</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>

      <div id="empty" class="empty" hidden>
        <div class="empty__title">Import your export</div>
        <div class="empty__text">
          In the iOS app: Stats → Export → “Export For Website (coins.json)”, then upload the file here.
        </div>
      </div>
    </main>

    <dialog id="detailDialog" class="dialog">
      <div class="dialog__header">
        <div>
          <div class="dialog__title" id="detailTitle">Coin</div>
          <div class="dialog__subtitle" id="detailSubtitle"></div>
        </div>
        <button class="btn btn--ghost" id="closeDialogBtn">Close</button>
      </div>

      <div class="dialog__body">
        <div class="kv">
          <div class="kv__row">
            <div class="kv__k">Year</div>
            <div class="kv__v" id="kvYear">—</div>
          </div>
          <div class="kv__row">
            <div class="kv__k">Type</div>
            <div class="kv__v" id="kvType">—</div>
          </div>
          <div class="kv__row">
            <div class="kv__k">Mint</div>
            <div class="kv__v" id="kvMint">—</div>
          </div>
          <div class="kv__row">
            <div class="kv__k">Melt Value (Est.)</div>
            <div class="kv__v" id="kvMelt">—</div>
          </div>
          <div class="kv__row">
            <div class="kv__k">Notes</div>
            <div class="kv__v kv__v--notes" id="kvNotes">—</div>
          </div>
        </div>
      </div>
    </dialog>

    <script src="./app.js"></script>
  </body>
</html>
