<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <radialGradient id="g" cx="35%" cy="30%" r="75%">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.55" stop-color="#eceff3"/>
      <stop offset="1" stop-color="#cfd6de"/>
    </radialGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9aa5b1"/>
      <stop offset="1" stop-color="#6c7784"/>
    </linearGradient>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <g filter="url(#s)">
    <circle cx="128" cy="128" r="116" fill="url(#g)" stroke="url(#rim)" stroke-width="10"/>
    <circle cx="128" cy="128" r="96" fill="none" stroke="#9aa5b1" stroke-opacity="0.35" stroke-width="2"/>
  </g>

  <!-- “BU” badge -->
  <g>
    <rect x="34" y="34" width="70" height="34" rx="17" fill="#2e7d6b" opacity="0.95"/>
    <text x="69" y="57" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="18" font-weight="900" fill="#ffffff">BU</text>
  </g>

  <!-- Simple silhouette + denomination -->
  <path d="M92 168c24 18 58 18 82 0 6-5 7-13 2-20-10-16-30-28-43-28s-33 12-43 28c-5 7-4 15 2 20Z"
        fill="#7a8591" fill-opacity="0.32"/>
  <circle cx="116" cy="116" r="20" fill="#7a8591" fill-opacity="0.30"/>

  <text x="128" y="214" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="34" font-weight="950" fill="#1b2028">$1</text>
</svg>

